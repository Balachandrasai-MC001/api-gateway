spring.application.name=api-gateway

server.port=8083

spring.cloud.gateway.server.webflux.routes[0].id=authentication-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTHENTICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=vulnerability-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://VULNERABILITY-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/vulnerabilities/**
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true